# Render Blueprint: deploy from repo root; backend lives in blacknumber-backend/
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: blacknumber-api
    runtime: java
    rootDir: blacknumber-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/blacknumber-backend-1.0.0.jar
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: JAVA_VERSION
        value: "17"
